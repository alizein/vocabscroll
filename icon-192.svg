<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <rect width="192" height="192" rx="40" fill="#0e0e0f"/>
  <!-- Card stack -->
  <rect x="38" y="62" width="116" height="80" rx="12" fill="#232328" stroke="#2e2e35" stroke-width="1.5"/>
  <rect x="32" y="56" width="116" height="80" rx="12" fill="#18181b" stroke="#2e2e35" stroke-width="1.5"/>
  <rect x="26" y="50" width="116" height="80" rx="12" fill="#1c1c22" stroke="#2e2e35" stroke-width="1.5"/>
  <!-- "VS" logotype on card -->
  <text x="84" y="100" font-family="Georgia,serif" font-size="28" font-weight="700" fill="#c8f04a" text-anchor="middle">VS</text>
  <!-- accent underline -->
  <rect x="60" y="108" width="48" height="3" rx="1.5" fill="#c8f04a" opacity="0.6"/>
  <!-- small dots bottom -->
  <circle cx="76" cy="148" r="4" fill="#c8f04a"/>
  <circle cx="96" cy="148" r="4" fill="#2e2e35"/>
  <circle cx="116" cy="148" r="4" fill="#2e2e35"/>
</svg>
